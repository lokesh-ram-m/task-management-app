<div class="project-wrapper">

  <!-- Page Header -->
  <div class="project-header">
    <h2>Projects</h2>
    <button class="btn-add" (click)="openCreateModal()">+ Add Project</button>
  </div>

  <!-- Project Table -->
  <div class="table-wrapper">
    <table class="project-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Description</th>
          <th>Created By</th>
          <th>Created At</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let project of projects">
          <td>{{ project.name }}</td>
          <td>{{ project.description }}</td>
          <td>{{ project.createdByUsername }}</td>
          <td>{{ project.createdAt | date: 'dd MMM yyyy' }}</td>
          <td class="action-btns">
            <button class="btn-edit" (click)="openEditModal(project)">Edit</button>
            <button class="btn-delete" (click)="deleteProject(project.id)">Delete</button>
          </td>
        </tr>
        <tr *ngIf="projects.length === 0">
          <td colspan="5" class="empty-msg">No projects found.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Modal Overlay -->
  <div class="modal-overlay" *ngIf="showModal" (click)="closeModal()">
    <div class="modal-card" (click)="$event.stopPropagation()">

      <div class="modal-header">
        <h3>{{ isEditMode ? 'Edit Project' : 'Create Project' }}</h3>
        <button class="btn-close" (click)="closeModal()">✕</button>
      </div>

      <form [formGroup]="projectForm" (ngSubmit)="onSubmit()">

        <div class="form-group">
          <label>Name</label>
          <input formControlName="name" type="text" placeholder="Enter project name..." />
          <span class="error-msg" *ngIf="projectForm.get('name')?.invalid && projectForm.get('name')?.touched">
            Name is required
          </span>
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea formControlName="description" placeholder="Enter project description..." rows="3"></textarea>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-cancel" (click)="closeModal()">Cancel</button>
          <button type="submit" class="btn-save">{{ isEditMode ? 'Update' : 'Create' }}</button>
        </div>

      </form>
    </div>
  </div>

</div>
