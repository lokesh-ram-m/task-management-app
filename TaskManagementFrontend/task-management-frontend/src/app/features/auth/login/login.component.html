<div class="login-wrapper">
  <div class="login-card">
    <h2>Sign In</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Username or Email</label>
        <input formControlName="login" type="text" placeholder="Enter your username or email" />
        <span
          class="error-msg"
          *ngIf="loginForm.get('login')?.invalid && loginForm.get('login')?.touched"
        >
          Username or email address is required
        </span>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input formControlName="password" type="password" placeholder="Enter your password" />
        <span
          class="error-msg"
          *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
        >
          Password is required
        </span>
      </div>

      <button class="btn-login" type="submit">Login</button>
    </form>

    <div class="register-link">Don't have an account? <a routerLink="/register">Register</a></div>
  </div>
</div>
