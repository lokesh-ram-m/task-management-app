<div class="register-wrapper">
  <div class="register-card">
    <h2>Create Account</h2>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Username</label>
        <input formControlName="username" type="text" placeholder="Enter your username..." />
        <span
          class="error-msg"
          *ngIf="registerForm.get('username')?.invalid && registerForm.get('username')?.touched"
        >
          Username is required
        </span>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input formControlName="email" type="email" placeholder="Enter your email address..." />
        <span
          class="error-msg"
          *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched"
        >
          Valid email is required
        </span>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input formControlName="password" type="password" placeholder="Enter your password..." />
        <span
          class="error-msg"
          *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched"
        >
          Password must be at least 6 characters
        </span>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input
          formControlName="confirmPassword"
          98
          type="password"
          placeholder="Confirm your password..."
        />
        <span
          class="error-msg"
          *ngIf="
            registerForm.get('confirmPassword')?.invalid &&
            registerForm.hasError('passwordMismatch') &&
            registerForm.get('confirmPassword')?.touched
          "
        >
          Passwords do not match
        </span>
      </div>

      <button class="btn-register" type="submit">Register</button>
    </form>

    <div class="login-link">Already have an account? <a routerLink="/login">Sign in</a></div>
  </div>
</div>
